services:
  mikrotik-bot:
    build: ./app
    container_name: mikrotik-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('${MIKROTIK_HOST}', int('${MIKROTIK_PORT}'))); s.close(); print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
