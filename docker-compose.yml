services:
  mikrotik-bot:
    build: .
    container_name: mikrotik-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; import os; s=socket.socket(); s.settimeout(3); s.connect((os.getenv('MIKROTIK_HOST'), int(os.getenv('MIKROTIK_PORT', 8728)))); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
